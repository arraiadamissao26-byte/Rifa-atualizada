<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venda de Rifa</title>
  <style>
    :root {
      --verde: #166534;
      --verde-escuro: #14532d;
      --vermelho: #b91c1c;
      --vermelho-escuro: #991b1b;
      --card: #ffffff;
      --texto: #1f2937;
      --suave: #6b7280;
      --borda: #d1d5db;
      --erro-bg: #fee2e2;
      --erro-tx: #991b1b;
      --ok-bg: #dcfce7;
      --ok-tx: #166534;
      --livre-bg: #dcfce7;
      --livre-borda: #86efac;
      --vendido-bg: #fee2e2;
      --vendido-borda: #fca5a5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eaf7ee 0%, #f8f8f8 100%);
      color: var(--texto);
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 18px;
    }

    .card {
      width: 100%;
      max-width: 980px;
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(0,0,0,.08);
      border: 1px solid rgba(0,0,0,.06);
    }

    .topo {
      background: var(--verde);
      color: #fff;
      padding: 24px 20px;
      text-align: center;
    }

    .topo h1 {
      margin: 0;
      font-size: 28px;
    }

    .topo p {
      margin: 8px 0 0;
      font-size: 14px;
      opacity: .95;
    }

    .conteudo {
      padding: 20px;
    }

    .vendedor-box {
      display: inline-block;
      background: #ecfdf5;
      color: var(--verde);
      border: 1px solid #bbf7d0;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      border: 1px solid var(--borda);
      border-radius: 14px;
      padding: 14px;
      background: #fafafa;
    }

    .stat small {
      display: block;
      color: var(--suave);
      margin-bottom: 4px;
    }

    .stat strong {
      font-size: 24px;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: bold;
    }

    input, select, button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--borda);
      font-size: 16px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--verde);
      box-shadow: 0 0 0 3px rgba(22,101,52,.12);
    }

    button {
      margin-top: 18px;
      background: var(--verde);
      color: #fff;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: var(--verde-escuro);
    }

    .hint {
      margin-top: 6px;
      color: var(--suave);
      font-size: 13px;
    }

    .msg {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      display: none;
      font-size: 14px;
    }

    .msg.ok {
      display: block;
      background: var(--ok-bg);
      color: var(--ok-tx);
    }

    .msg.erro {
      display: block;
      background: var(--erro-bg);
      color: var(--erro-tx);
    }

    .loading {
      opacity: .7;
      pointer-events: none;
    }

    .secao-cartela {
      margin-top: 28px;
    }

    .secao-cartela h3 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .filtros {
      display: flex;
      gap: 10px;
      margin: 12px 0 18px;
      flex-wrap: wrap;
    }

    .filtros button {
      width: auto;
      margin-top: 0;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
    }

    .filtros button.ativo {
      background: var(--verde-escuro);
    }

    .grade-pontos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 10px;
    }

    .ponto {
      position: relative;
      border-radius: 14px;
      padding: 16px 8px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      border: 2px solid transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .ponto.livre {
      background: var(--livre-bg);
      color: var(--verde);
      border-color: var(--livre-borda);
    }

    .ponto.vendido {
      background: var(--vendido-bg);
      color: var(--vermelho-escuro);
      border-color: var(--vendido-borda);
    }

    .ponto .numero {
      display: block;
      font-size: 20px;
      line-height: 1;
      z-index: 2;
    }

    .ponto .legenda {
      display: block;
      font-size: 10px;
      margin-top: 6px;
      font-weight: 700;
      z-index: 2;
    }

    .ponto .xis {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: bold;
      color: rgba(153, 27, 27, 0.90);
      pointer-events: none;
      z-index: 1;
    }

      text-align: center;
      padding: 22px 20px 26
